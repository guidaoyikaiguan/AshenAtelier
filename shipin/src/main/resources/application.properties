# 应用程序名称
spring.application.name=shipin

# 服务器端口
server.port=8081

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/shipin?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Druid数据源配置
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.druid.initial-size=5
spring.datasource.druid.min-idle=5
spring.datasource.druid.max-active=20
spring.datasource.druid.max-wait=60000
spring.datasource.druid.time-between-eviction-runs-millis=60000
spring.datasource.druid.min-evictable-idle-time-millis=300000
spring.datasource.druid.validation-query=SELECT 1 FROM DUAL
spring.datasource.druid.test-while-idle=true
spring.datasource.druid.test-on-borrow=false
spring.datasource.druid.test-on-return=false
spring.datasource.druid.pool-prepared-statements=true
spring.datasource.druid.max-pool-prepared-statement-per-connection-size=20

# MyBatis配置
mybatis.mapper-locations=classpath:com/shipin/mappers/*.xml
mybatis.type-aliases-package=com.shipin.entity.po
mybatis.configuration.map-underscore-to-camel-case=true

# 日志配置
logging.level.root=info
logging.level.com.shipin=debug

# Redis配置
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.database=0
spring.redis.timeout=10000

# ===================== 七牛云配置 =====================
qiniu.access-key=${QINIU_ACCESS_KEY:}
qiniu.secret-key=${QINIU_SECRET_KEY:}
qiniu.bucket-name=${QINIU_BUCKET_NAME:monvshipin}
qiniu.domain=${QINIU_DOMAIN:tet31ocbs.hn-bkt.clouddn.com}

# ===================== JWT配置 =====================
jwt.secret-key=${JWT_SECRET_KEY:change-me}

# JWT Token过期时间（毫秒）
# 示例：1天=86400000毫秒，2小时=7200000毫秒，7天=604800000毫秒
jwt.expire-time=86400000

# ===================== AI Agent Service =====================
ai-agent.service.url=http://localhost:8084

# HTTP请求编码
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# 文件上传大小限制
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ===================== Elasticsearch?? =====================
