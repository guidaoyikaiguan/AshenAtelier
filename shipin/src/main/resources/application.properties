spring.elasticsearch.cluster-name=elasticsearch
# Elasticsearch????
spring.elasticsearch.uris=http://localhost:9201
# ??????????
spring.elasticsearch.connection-timeout=10000
# ??????????
spring.elasticsearch.socket-timeout=30000