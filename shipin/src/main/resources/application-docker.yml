server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/shipin?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    druid:
      connection-init-sqls: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
  redis:
    host: redis
    port: 6379
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  elasticsearch:
    uris: http://elasticsearch:9201

jwt:
  secret-key: ${JWT_SECRET_KEY:abcdefghijklmnopqrstuvwxyz1234567890abcdef}

ai-agent:
  service:
    url: http://host.docker.internal:8084

app:
  storage:
    root: /data/shipin

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/
